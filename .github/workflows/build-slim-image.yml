name: Export Offline Docker Image

on:
  workflow_dispatch:

jobs:
  build-and-export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true 
          tags: wavemart-offline:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save and Compress Image
        run: |
          echo "Compressing image... this may take several minutes."
          docker save wavemart-offline:latest | gzip > wavemart-offline.tar.gz

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-offline-image
          path: wavemart-offline.tar.gz
          retention-days: 7
