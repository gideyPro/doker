name: Export Offline Docker Image

on:
  workflow_dispatch:

jobs:
  build-and-export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # This ensures the image is available in the local docker daemon
          tags: flutter-offline:latest
          # Use cache-from/cache-to to speed up future builds if needed
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save and Compress Image
        run: |
          echo "Exporting and compressing image... this may take a few minutes."
          docker save flutter-offline:latest | gzip > flutter-offline.tar.gz

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-offline-image
          path: flutter-offline.tar.gz
          retention-days: 7
          compression-level: 0 # Already compressed via gzip
